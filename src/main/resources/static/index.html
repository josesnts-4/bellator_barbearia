<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/> // Faz a página adaptar ao tamanho da tela.
  <meta name="theme-color" content="#0b0b0b"/>
  <title>Bellator Barbearia • Agendamentos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css"/>
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <button class="icon-btn" id="backBtn" aria-label="Voltar" title="Voltar">
        <i data-lucide="arrow-left"></i>
      </button>

      <div class="brand">
        <img class="brand__logo" src="./assets/logo.png" alt="Bellator Barbearia" onerror="this.style.display='none'">
        <div class="brand__text">
          <div class="brand__name">BELLATOR</div>
          <div class="brand__sub">BARBEARIA</div>
        </div>
      </div>

      <button class="icon-btn" id="menuBtn" aria-label="Menu" title="Menu">
        <i data-lucide="menu"></i>
      </button>
    </header>

    <main id="view" class="view" aria-live="polite"></main>

    <nav id="bottomNav" class="bottom-nav" aria-label="Navegação">
      <a class="bottom-nav__item" href="#/home" data-route="home">
        <i data-lucide="home"></i>
        <span>Início</span>
      </a>
      <a class="bottom-nav__item" href="#/appointments" data-route="appointments">
        <i data-lucide="calendar"></i>
        <span>Agenda</span>
      </a>
      <a class="bottom-nav__item" href="#/profile" data-route="profile">
        <i data-lucide="user"></i>
        <span>Perfil</span>
      </a>
    </nav>

    <a id="whatsBtn" class="whats" target="_blank" rel="noopener" aria-label="WhatsApp" title="Chamar no WhatsApp">
      <i data-lucide="message-circle"></i>
    </a>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <div id="modalRoot" class="modal-root" aria-hidden="true"></div>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="../../bellator_barbearia/src/main/resources/static/js/app.js"></script>
</body>
</html>
